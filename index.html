<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>img.ksrnyx.top</title>
  <style>
    :root {
      --bg: #f5f1ec;
      --paper: rgba(255, 252, 248, 0.92);
      --line: rgba(120, 96, 86, 0.14);
      --ink: #2c2421;
      --soft: #7f6a62;
      --accent: #8f5f56;
      --shadow: 0 24px 80px rgba(71, 49, 42, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 18%, rgba(215, 197, 189, 0.34), transparent 28%),
        radial-gradient(circle at 85% 14%, rgba(238, 228, 220, 0.82), transparent 32%),
        linear-gradient(180deg, #f7f2ec, #f2ece5 52%, #f7f3ee);
    }
    .card {
      width: min(720px, 100%);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 34px 36px 32px;
    }
    .eyebrow {
      display: inline-flex;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(143, 95, 86, 0.16);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 18px 0 14px;
      font-family: "Georgia", "Times New Roman", "Noto Serif SC", "Songti SC", serif;
      font-size: clamp(32px, 5vw, 56px);
      line-height: 0.95;
      letter-spacing: -0.04em;
      font-weight: 600;
    }
    p {
      margin: 0;
      color: var(--soft);
      line-height: 1.8;
      font-size: 15px;
      max-width: 52ch;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
    }
    .primary {
      color: white;
      background: linear-gradient(135deg, #8f5f56, #b98c83);
    }
    .secondary {
      color: var(--ink);
      background: rgba(255, 252, 248, 0.95);
      border: 1px solid var(--line);
    }
    code {
      padding: 2px 6px;
      border-radius: 8px;
      background: rgba(44, 36, 33, 0.06);
      color: var(--ink);
      font-family: Consolas, monospace;
      font-size: 0.94em;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Image Host</div>
    <h1>图片图床已启用</h1>
    <p>
      这里是 <code>img.ksrnyx.top</code> 的静态图片托管首页。
      实际图片文件发布在 <code>/images/...</code> 路径下，公开生成入口在
      <code>codex.ksrnyx.top</code>。
    </p>
    <div class="links">
      <a class="primary" href="https://codex.ksrnyx.top">打开生成入口</a>
      <a class="secondary" href="/images/">查看图片目录</a>
    </div>
  </main>
</body>
</html>
